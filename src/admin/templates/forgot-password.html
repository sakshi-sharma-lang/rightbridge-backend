<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Password Reset</title>
</head>

<body style="margin:0; padding:0; background-color:#f3f4f6; font-family:Arial, Helvetica, sans-serif;">

  <div style="max-width:600px; margin:40px auto; background-color:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.05);">

    <!-- Header -->
    <div style="background-color:#2563eb; color:#ffffff; text-align:center; padding:20px;">
      <h1 style="margin:0; font-size:20px; font-weight:600;">
        RightBridge
      </h1>
    </div>

    <!-- Body -->
    <div style="padding:30px; color:#374151; font-size:14px; line-height:1.6;">

      <p style="margin-top:0;">Hello,</p>

      <p style="margin:0 0 20px 0;">
        You requested to reset your password. Click the button below to proceed.
      </p>

      <!-- Button -->
      <div style="text-align:center; margin:30px 0;">
        <a
          href="{{RESET_LINK}}"
          style="
            background-color:#2563eb;
            color:#ffffff;
            padding:14px 28px;
            border-radius:6px;
            font-size:16px;
            font-weight:600;
            text-decoration:none;
            display:inline-block;
          "
        >
          Reset Password
        </a>
      </div>

      <p style="margin:0 0 16px 0;">
        This link will expire in <strong>15 minutes</strong>.
      </p>

      <p style="margin:0 0 24px 0;">
        If you did not request a password reset, please ignore this email.
      </p>

      <p style="margin-bottom:0;">
        Thanks,<br />
        <strong>RightBridge Team</strong>
      </p>

    </div>

    <!-- Footer -->
    <div style="background-color:#f3f4f6; text-align:center; font-size:12px; color:#6b7280; padding:15px;">
      © 2026 RightBridge. All rights reserved.
    </div>

  </div>

</body>
</html>
