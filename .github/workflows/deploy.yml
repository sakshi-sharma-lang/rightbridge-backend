name: Deploy rightbridge Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          # Use a heredoc to preserve newlines and add a trailing newline
          cat <<EOF > ~/.ssh/id_rsa
          ${{ secrets.SERVER_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          # Use -tt to force a pseudo-terminal if needed, or stick to standard for CI
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e  # Exit immediately if a command fails
            
            # Load NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Use the required Node version
            nvm use 22 || nvm install 22

            # Navigate to project
            cd /var/www/html/rightbridgeapi

            # Update code
            git fetch origin
            git reset --hard origin/main

            # Install dependencies
            npm install --production

            # Restart application
            pm2 restart 0 
          EOF
